<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy St. Patrick's Day!</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    #scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #1a3a5c 0%, #2a6098 18%, #4a90c8 32%, #7ab8e8 45%, #a8d4f0 58%, #c8e8f8 68%, #e0f4f8 78%, #d4e8a0 88%, #8ab84a 95%, #4a8820 100%);
    }

    .mountain { position: absolute; bottom: 0; }

    .mountain-back {
      width: 0; height: 0;
      border-left: 200px solid transparent;
      border-right: 180px solid transparent;
      border-bottom: 160px solid #2d5a27;
      bottom: 40px; left: -30px; opacity: 0.7;
    }

    .mountain-back2 {
      width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 220px solid transparent;
      border-bottom: 140px solid #3a7030;
      bottom: 40px; right: -40px; opacity: 0.7;
    }

    .mountain-mid {
      width: 0; height: 0;
      border-left: 160px solid transparent;
      border-right: 140px solid transparent;
      border-bottom: 200px solid #1e4a18;
      bottom: 40px; left: 60px; opacity: 0.85;
    }

    .mountain-mid2 {
      width: 0; height: 0;
      border-left: 120px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 180px solid #265c1e;
      bottom: 40px; right: 50px; opacity: 0.85;
    }

    .ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 55px;
      background: linear-gradient(180deg, #4a8820 0%, #3a6a18 60%, #2a4e10 100%);
    }

    .grass-tufts {
      position: absolute; bottom: 48px; left: 0; right: 0; height: 18px;
      background:
        radial-gradient(ellipse 6px 12px at 5% 100%, #5aaa28 100%, transparent 100%),
        radial-gradient(ellipse 6px 10px at 10% 100%, #4a9220 100%, transparent 100%),
        radial-gradient(ellipse 7px 14px at 18% 100%, #5aaa28 100%, transparent 100%),
        radial-gradient(ellipse 6px 11px at 25% 100%, #4a9220 100%, transparent 100%),
        radial-gradient(ellipse 8px 13px at 35% 100%, #5aaa28 100%, transparent 100%),
        radial-gradient(ellipse 6px 12px at 45% 100%, #4a9220 100%, transparent 100%),
        radial-gradient(ellipse 7px 14px at 55% 100%, #5aaa28 100%, transparent 100%),
        radial-gradient(ellipse 6px 10px at 65% 100%, #4a9220 100%, transparent 100%),
        radial-gradient(ellipse 8px 13px at 75% 100%, #5aaa28 100%, transparent 100%),
        radial-gradient(ellipse 6px 12px at 85% 100%, #4a9220 100%, transparent 100%),
        radial-gradient(ellipse 7px 14px at 95% 100%, #5aaa28 100%, transparent 100%);
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.82);
      border-radius: 50px;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.82);
      border-radius: 50%;
    }

    #pot-container {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      z-index: 10;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    #pot-container:active { transform: translateX(-50%) scale(0.95); }
    #pot-container:hover #pot-svg { filter: brightness(1.08); }

    .coin-particle {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffe566, #f0a800 60%, #c07800 100%);
      border: 2px solid #a06000;
      pointer-events: none;
      z-index: 20;
      box-shadow: inset 0 1px 2px rgba(255,255,150,0.6);
    }

    #message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      text-align: center;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      background: rgba(0,0,0,0.18);
      border-radius: 20px;
      padding: 18px 32px 14px;
      border: 3px solid rgba(255,220,50,0.7);
      backdrop-filter: blur(4px);
    }

    #message.show {
      opacity: 1;
      animation: msgPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes msgPop {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-5deg); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg);  opacity: 1; }
    }

    #message .main-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 26px; font-weight: 900;
      color: #ffe033;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7), 0 0 20px rgba(255,200,0,0.8);
      line-height: 1.2; letter-spacing: 1px;
    }

    #message .sub-text {
      font-family: 'Lora', serif;
      font-style: italic; font-size: 15px;
      color: #d4f7d4; margin-top: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    #click-hint {
      position: absolute;
      bottom: 155px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Lora', serif;
      font-style: italic; font-size: 13px;
      color: rgba(255,255,230,0.75);
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      white-space: nowrap;
      animation: hintFade 2.5s ease-in-out infinite;
    }

    @keyframes hintFade {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    #click-count {
      position: absolute;
      bottom: 170px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 15;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 1.5px solid rgba(255,255,100,0.5);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #ffe033;
      border-color: #f0a800;
      transform: scale(1.3);
      box-shadow: 0 0 6px rgba(255,220,0,0.8);
    }

    .sparkle {
      position: absolute;
      pointer-events: none; z-index: 25;
      animation: sparkleFly 0.6s ease-out forwards;
    }

    @keyframes sparkleFly {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
    }

    #shamrocks { position: absolute; bottom: 50px; left: 0; right: 0; pointer-events: none; }

    .shamrock {
      position: absolute; font-size: 18px; opacity: 0.4;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    @keyframes coinArc {
      0%   { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--cx), var(--cy)) rotate(var(--cr)); opacity: 0.2; }
    }

    @keyframes potShake {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      20%       { transform: translateX(-50%) rotate(-6deg); }
      40%       { transform: translateX(-50%) rotate(6deg); }
      60%       { transform: translateX(-50%) rotate(-4deg); }
      80%       { transform: translateX(-50%) rotate(4deg); }
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="scene">

  <!-- Rainbow (SVG arcs) -->
  <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:900px;height:500px;">
    <svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="rainbowClip">
          <rect x="0" y="0" width="900" height="480"/>
        </clipPath>
      </defs>
      <g clip-path="url(#rainbowClip)">
        <path d="M20,500 A430,430 0 0,1 880,500" fill="none" stroke="#e63946" stroke-width="28" stroke-opacity="0.55"/>
        <path d="M46,500 A404,404 0 0,1 854,500" fill="none" stroke="#f77f00" stroke-width="26" stroke-opacity="0.55"/>
        <path d="M70,500 A380,380 0 0,1 830,500" fill="none" stroke="#fcbf49" stroke-width="24" stroke-opacity="0.6"/>
        <path d="M92,500 A358,358 0 0,1 808,500" fill="none" stroke="#eae2b7" stroke-width="22" stroke-opacity="0.55"/>
        <path d="M112,500 A338,338 0 0,1 788,500" fill="none" stroke="#2dc653" stroke-width="22" stroke-opacity="0.55"/>
        <path d="M132,500 A318,318 0 0,1 768,500" fill="none" stroke="#0077b6" stroke-width="22" stroke-opacity="0.55"/>
        <path d="M152,500 A298,298 0 0,1 748,500" fill="none" stroke="#7209b7" stroke-width="22" stroke-opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- Mountains -->
  <div class="mountain mountain-back"></div>
  <div class="mountain mountain-back2"></div>
  <div class="mountain mountain-mid"></div>
  <div class="mountain mountain-mid2"></div>
  <div style="position:absolute;bottom:40px;left:30%;width:0;height:0;border-left:100px solid transparent;border-right:120px solid transparent;border-bottom:130px solid #1a4214;opacity:0.9;"></div>
  <div style="position:absolute;bottom:40px;left:55%;width:0;height:0;border-left:130px solid transparent;border-right:100px solid transparent;border-bottom:120px solid #22521a;opacity:0.88;"></div>

  <!-- Ground -->
  <div class="ground"></div>
  <div class="grass-tufts"></div>

  <!-- Clouds -->
  <div class="cloud" style="width:90px;height:30px;top:60px;left:8%;opacity:0.85;">
    <div class="cloud" style="width:50px;height:50px;top:-25px;left:10px;border-radius:50%;"></div>
    <div class="cloud" style="width:40px;height:40px;top:-18px;left:38px;border-radius:50%;"></div>
  </div>
  <div class="cloud" style="width:70px;height:24px;top:80px;right:12%;opacity:0.75;">
    <div class="cloud" style="width:38px;height:38px;top:-20px;left:8px;border-radius:50%;"></div>
    <div class="cloud" style="width:30px;height:30px;top:-14px;left:32px;border-radius:50%;"></div>
  </div>
  <div class="cloud" style="width:110px;height:28px;top:45px;left:38%;opacity:0.7;">
    <div class="cloud" style="width:55px;height:55px;top:-30px;left:10px;border-radius:50%;"></div>
    <div class="cloud" style="width:44px;height:44px;top:-22px;left:52px;border-radius:50%;"></div>
    <div class="cloud" style="width:36px;height:36px;top:-16px;left:82px;border-radius:50%;"></div>
  </div>

  <!-- Shamrocks -->
  <div id="shamrocks">
    <span class="shamrock" style="left:5%;animation-delay:0s;">☘️</span>
    <span class="shamrock" style="left:12%;animation-delay:0.3s;">☘️</span>
    <span class="shamrock" style="left:22%;animation-delay:0.7s;">☘️</span>
    <span class="shamrock" style="left:32%;animation-delay:1.1s;font-size:14px;">☘️</span>
    <span class="shamrock" style="left:70%;animation-delay:0.5s;font-size:14px;">☘️</span>
    <span class="shamrock" style="left:80%;animation-delay:0.9s;">☘️</span>
    <span class="shamrock" style="left:90%;animation-delay:0.2s;">☘️</span>
    <span class="shamrock" style="left:96%;animation-delay:1.4s;font-size:14px;">☘️</span>
  </div>

  <!-- Click progress dots -->
  <div id="click-count">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
  </div>
  <div id="click-hint">Click the pot of gold!</div>

  <!-- Pot of Gold -->
  <div id="pot-container" onclick="clickPot()">
    <svg id="pot-svg" width="120" height="130" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="118" rx="52" ry="8" fill="rgba(0,0,0,0.25)"/>
      <ellipse cx="60" cy="32" rx="38" ry="12" fill="#f0a800" stroke="#c07800" stroke-width="1.5"/>
      <ellipse cx="60" cy="28" rx="38" ry="12" fill="#ffe033" stroke="#c07800" stroke-width="1.5"/>
      <ellipse cx="60" cy="26" rx="36" ry="10" fill="#ffd700" stroke="#d4a017" stroke-width="1"/>
      <ellipse cx="60" cy="24" rx="34" ry="9" fill="#ffe566" stroke="#c8920a" stroke-width="0.8"/>
      <rect x="24" y="25" width="72" height="10" rx="2" fill="#f0a800" stroke="#c07800" stroke-width="0.5"/>
      <rect x="24" y="28" width="72" height="8" rx="2" fill="#e09800"/>
      <path d="M22,38 Q14,60 16,85 Q18,110 60,114 Q102,110 104,85 Q106,60 98,38 Z" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <path d="M28,45 Q26,65 27,82" stroke="#444" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
      <path d="M34,42 Q31,62 32,78" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <rect x="18" y="34" width="84" height="10" rx="5" fill="#222" stroke="#3a3a3a" stroke-width="1.5"/>
      <rect x="20" y="35" width="80" height="8" rx="4" fill="#2a2a2a"/>
      <rect x="24" y="65" width="72" height="14" rx="2" fill="#1a6e1a" stroke="#0f4e0f" stroke-width="1"/>
      <text x="60" y="76" font-size="10" text-anchor="middle" fill="#2aaa2a">☘ ☘ ☘</text>
      <ellipse cx="38" cy="113" rx="10" ry="4" fill="#111" stroke="#2a2a2a" stroke-width="0.5"/>
      <ellipse cx="60" cy="116" rx="10" ry="4" fill="#111" stroke="#2a2a2a" stroke-width="0.5"/>
      <ellipse cx="82" cy="113" rx="10" ry="4" fill="#111" stroke="#2a2a2a" stroke-width="0.5"/>
      <path d="M22,50 Q6,50 6,65 Q6,78 22,78" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
      <path d="M22,50 Q8,50 8,65 Q8,78 22,78" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      <path d="M98,50 Q114,50 114,65 Q114,78 98,78" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
      <path d="M98,50 Q112,50 112,65 Q112,78 98,78" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Celebration message -->
  <div id="message">
    <div class="main-text">☘️ Happy St. Patrick's Day! ☘️</div>
    <div class="sub-text">May the luck of the Irish be with you!</div>
  </div>

</div>

<script>
  let clickCount = 0;
  const maxClicks = 3;
  const potContainer = document.getElementById('pot-container');
  const scene = document.getElementById('scene');
  const message = document.getElementById('message');
  const hint = document.getElementById('click-hint');
  const dots = [document.getElementById('d0'), document.getElementById('d1'), document.getElementById('d2')];

  function clickPot() {
    if (clickCount >= maxClicks) return;
    clickCount++;
    dots[clickCount - 1].classList.add('active');
    animatePotShake();
    spawnCoins();
    if (clickCount === maxClicks) {
      setTimeout(() => showMessage(), 600);
      hint.style.opacity = '0';
    } else {
      hint.textContent = clickCount === 1 ? 'Click again!' : 'One more time!';
    }
  }

  function animatePotShake() {
    potContainer.style.animation = 'none';
    potContainer.offsetHeight; // force reflow
    potContainer.style.animation = 'potShake 0.5s ease-in-out';
    setTimeout(() => { potContainer.style.animation = ''; }, 500);
  }

  function spawnCoins() {
    const rect = potContainer.getBoundingClientRect();
    const sceneRect = scene.getBoundingClientRect();
    const ox = rect.left - sceneRect.left + rect.width / 2;
    const oy = rect.top - sceneRect.top + 30;
    const count = 18 + clickCount * 6;

    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const coin = document.createElement('div');
        coin.className = 'coin-particle';
        const angle = (Math.random() * 220 - 110) * (Math.PI / 180);
        const speed = 80 + Math.random() * 120;
        const cx = Math.cos(angle - Math.PI / 2) * speed;
        const cy = Math.sin(angle - Math.PI / 2) * speed + 60;
        coin.style.left = (ox - 9) + 'px';
        coin.style.top  = (oy - 9) + 'px';
        coin.style.setProperty('--cx', cx + 'px');
        coin.style.setProperty('--cy', cy + 'px');
        coin.style.setProperty('--cr', (Math.random() * 720 - 360) + 'deg');
        coin.style.animation = `coinArc ${0.6 + Math.random() * 0.5}s cubic-bezier(0.25,0.46,0.45,0.94) ${Math.random() * 0.15}s forwards`;
        scene.appendChild(coin);
        setTimeout(() => coin.remove(), 1400);
      }, i * 18);
    }
    spawnSparkles(ox, oy);
  }

  function spawnSparkles(ox, oy) {
    const colors = ['#ffe033','#ffd700','#fff5a0','#f0a800','#ffffff'];
    for (let i = 0; i < 10; i++) {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      const tx = (Math.random() - 0.5) * 100;
      const ty = -(Math.random() * 80 + 20);
      sp.style.left   = (ox - 4 + (Math.random() - 0.5) * 30) + 'px';
      sp.style.top    = (oy - 4 + (Math.random() - 0.5) * 20) + 'px';
      sp.style.width  = (4 + Math.random() * 6) + 'px';
      sp.style.height = sp.style.width;
      sp.style.borderRadius = '50%';
      sp.style.background   = colors[Math.floor(Math.random() * colors.length)];
      sp.style.setProperty('--tx', tx + 'px');
      sp.style.setProperty('--ty', ty + 'px');
      sp.style.animationDelay = (Math.random() * 0.2) + 's';
      scene.appendChild(sp);
      setTimeout(() => sp.remove(), 800);
    }
  }

  function showMessage() {
    message.classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ffe033','#2dc653','#f77f00','#e63946','#7209b7','#0077b6','#fff'];
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        const size = 6 + Math.random() * 8;
        const isCircle = Math.random() > 0.5;
        c.style.cssText = `
          position: absolute;
          width: ${size}px; height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          border-radius: ${isCircle ? '50%' : '2px'};
          left: ${Math.random() * 100}%;
          top: -10px;
          z-index: 40;
          pointer-events: none;
          animation: confettiFall ${1.5 + Math.random() * 2}s linear forwards;
        `;
        scene.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 40);
    }
  }
</script>
</body>
</html>
